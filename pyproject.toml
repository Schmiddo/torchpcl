[project]
name = "torchpcl"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "small-gicp",
    "torch>=2.12.0",
    "warp-lang>=1.14.0",
]

[build-system]
requires = ["uv_build>=0.7.0,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = ["pytest>=8"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.workspace]
members = [
    "third_party/small_gicp",
]

[tool.uv.sources]
small-gicp = { workspace = true, editable = true }
